version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: guineamanager-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: guineamanager
      POSTGRES_PASSWORD: guineamanager123
      POSTGRES_DB: guineamanager
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U guineamanager"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: guineamanager-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Service optionnel pour visualiser Redis
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: guineamanager-redis-ui
    restart: unless-stopped
    environment:
      - REDIS_HOSTS=local:redis:6379
    ports:
      - "8081:8081"
    depends_on:
      - redis

  # Service optionnel pour visualiser PostgreSQL
  adminer:
    image: adminer:latest
    container_name: guineamanager-adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      - postgres

volumes:
  postgres_data:
  redis_data:

networks:
  default:
    name: guineamanager-network
