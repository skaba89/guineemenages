# GuinéaManager ERP - Docker Compose Configuration
# Simplified version using SQLite (no external database required)

services:
  # ==========================================
  # MAIN APPLICATION (All-in-One)
  # ==========================================
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: guineamanager
    restart: unless-stopped
    ports:
      - "3000:3000"
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=file:/app/data/prod.db
      - JWT_SECRET=${JWT_SECRET:-guineamanager-production-jwt-secret-key-2024-secure}
      - NEXT_PUBLIC_API_URL=/api
      - BACKEND_URL=http://localhost:3001
      # Email (optional)
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASS=${SMTP_PASS:-}
      # Payment APIs (optional)
      - ORANGE_MONEY_CLIENT_ID=${ORANGE_MONEY_CLIENT_ID:-}
      - ORANGE_MONEY_CLIENT_SECRET=${ORANGE_MONEY_CLIENT_SECRET:-}
      - MTN_MONEY_SUBSCRIPTION_KEY=${MTN_MONEY_SUBSCRIPTION_KEY:-}
      - MTN_MONEY_API_KEY=${MTN_MONEY_API_KEY:-}
      # Push notifications (optional)
      - VAPID_PUBLIC_KEY=${VAPID_PUBLIC_KEY:-}
      - VAPID_PRIVATE_KEY=${VAPID_PRIVATE_KEY:-}
    volumes:
      - guineamanager-data:/app/data
      - guineamanager-uploads:/app/uploads
    networks:
      - guineamanager-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ==========================================
  # OPTIONAL: PostgreSQL Database
  # Uncomment to use PostgreSQL instead of SQLite
  # ==========================================
  # db:
  #   image: postgres:16-alpine
  #   container_name: guineamanager-db
