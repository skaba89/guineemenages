services:
  # ==========================================
  # MAIN APPLICATION
  # ==========================================
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: guineamanager
    restart: unless-stopped
    ports:
      - "3000:3000"
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://guineamanager:password@db:5432/guineamanager
      - JWT_SECRET=${JWT_SECRET:-change-this-secret-in-production}
      - NEXT_PUBLIC_API_URL=http://localhost:3001/api
      # Email (optional)
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASS=${SMTP_PASS:-}
      # Payment APIs (optional)
      - ORANGE_MONEY_CLIENT_ID=${ORANGE_MONEY_CLIENT_ID:-}
      - ORANGE_MONEY_CLIENT_SECRET=${ORANGE_MONEY_CLIENT_SECRET:-}
      - MTN_MONEY_SUBSCRIPTION_KEY=${MTN_MONEY_SUBSCRIPTION_KEY:-}
      - MTN_MONEY_API_KEY=${MTN_MONEY_API_KEY:-}
      # Push notifications (optional)
      - VAPID_PUBLIC_KEY=${VAPID_PUBLIC_KEY:-}
      - VAPID_PRIVATE_KEY=${VAPID_PRIVATE_KEY:-}
    volumes:
      - ./data:/app/data
      - ./uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy
    networks:
      - guineamanager-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ==========================================
  # DATABASE
  # ==========================================
  db:
    image: postgres:16-alpine
    container_name: guineamanager-db
    restart: unless-stopped
    environment:
      - POSTGRES_USER=guineamanager
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=guineamanager
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - guineamanager-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U guineamanager"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  guineamanager-network:
    driver: bridge

volumes:
  postgres-data:
