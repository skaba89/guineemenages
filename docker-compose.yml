  #   volumes:
  #     - postgres-data:/var/lib/postgresql/data
  #   networks:
  #     - guineamanager-network
  #   healthcheck:
  #     test: ["CMD-SHELL", "pg_isready -U guineamanager"]
  #     interval: 10s
  #     timeout: 5s
  #     retries: 5

networks:
  guineamanager-network:
    driver: bridge

volumes:
  guineamanager-data:
  guineamanager-uploads:
