version: '3.8'

services:
  # ==========================================
  # MAIN APPLICATION
  # ==========================================
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: guineamanager
    restart: unless-stopped
    ports:
      - "3000:3000"
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://guineamanager:password@db:5432/guineamanager
      - JWT_SECRET=${JWT_SECRET:-change-this-secret}
      - NEXT_PUBLIC_API_URL=http://localhost:3001/api
      - SMTP_HOST=${SMTP_HOST:-smtp.gmail.com}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
      - ORANGE_MONEY_CLIENT_ID=${ORANGE_MONEY_CLIENT_ID}
      - ORANGE_MONEY_CLIENT_SECRET=${ORANGE_MONEY_CLIENT_SECRET}
      - MTN_MONEY_SUBSCRIPTION_KEY=${MTN_MONEY_SUBSCRIPTION_KEY}
      - MTN_MONEY_API_KEY=${MTN_MONEY_API_KEY}
      - VAPID_PUBLIC_KEY=${VAPID_PUBLIC_KEY}
      - VAPID_PRIVATE_KEY=${VAPID_PRIVATE_KEY}
    volumes:
      - ./data:/app/data
      - ./uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - guineamanager-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ==========================================
  # DATABASE
  # ==========================================
  db:
    image: postgres:16-alpine
    container_name: guineamanager-db
    restart: unless-stopped
    environment:
      - POSTGRES_USER=guineamanager
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=guineamanager
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - guineamanager-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U guineamanager"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==========================================
  # REDIS CACHE
  # ==========================================
  redis:
    image: redis:7-alpine
    container_name: guineamanager-redis
    restart: unless-stopped
    volumes:
      - redis-data:/data
    networks:
      - guineamanager-network
    command: redis-server --appendonly yes

  # ==========================================
  # NGINX REVERSE PROXY (Optional)
  # ==========================================
  nginx:
    image: nginx:alpine
    container_name: guineamanager-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
    depends_on:
      - app
    networks:
      - guineamanager-network

  # ==========================================
  # CERTBOT (SSL Certificates)
  # ==========================================
  certbot:
    image: certbot/certbot
    container_name: guineamanager-certbot
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    networks:
      - guineamanager-network

networks:
  guineamanager-network:
    driver: bridge

volumes:
  postgres-data:
  redis-data:
